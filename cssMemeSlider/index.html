<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meme slider</title>
  <link rel="icon" type="image/x-icon" href="./img/favicon.png">
  <link rel="stylesheet" href="./css/reset.css">
  <link rel="stylesheet" href="./css/style.css">
</head>

<body>
  <div class="slider">
    <div class="slides">
      <input type="radio" name="slide" id="slide-1" checked>
      <figure class="slide slide-first">
        <img src="./img/mouse.jpg" alt="Мышь" class="slide-img">
        <figcaption class="slide-text">Средневековые достижения</figcaption>
      </figure>
      <input type="radio" name="slide" id="slide-2">
      <figure class="slide">
        <img src="./img/lies.jpg" alt="Ложь" class="slide-img">
        <figcaption class="slide-text">Сказал не правду</figcaption>
      </figure>
      <input type="radio" name="slide" id="slide-3">
      <figure class="slide">
        <img src="./img/atomic-energy.jpg" alt="Атомная энергия" class="slide-img">
        <figcaption class="slide-text">Быстрая атомная энергия</figcaption>
      </figure>
      <input type="radio" name="slide" id="slide-4">
      <figure class="slide">
        <img src="./img/snake.jpg" alt="Змея" class="slide-img">
        <figcaption class="slide-text">Хрусть</figcaption>
      </figure>
      <input type="radio" name="slide" id="slide-5">

      <figure class="slide">
        <img src="./img/waffle.jpg" alt="Вафелька" class="slide-img">
        <figcaption class="slide-text">Зачем погубила...</figcaption>
      </figure>
    </div>
    <div class="navigation">
      <label for="slide-1" class="navigation__btn">
        <div class="navigation__icon"></div>
      </label>
      <label for="slide-2" class="navigation__btn">
        <div class="navigation__icon"></div>
      </label>
      <label for="slide-3" class="navigation__btn">
        <div class="navigation__icon"></div>
      </label>
      <label for="slide-4" class="navigation__btn">
        <div class="navigation__icon"></div>
      </label>
      <label for="slide-5" class="navigation__btn">
        <div class="navigation__icon"></div>
      </label>
    </div>
  </div>

</body>

</html>
